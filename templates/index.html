<!DOCTYPE html>
<html>
<head>
    <title>Explore Nearby Places</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
<div class="app">

    <!-- 📍 Sidebar -->
    <div class="sidebar">

        <!-- 🎥 Background Video -->
        <video autoplay muted loop class="sidebar-video">
            <source src="/static/video/backgroundvideo.mp4" type="video/mp4">
        </video>

        <!-- Overlay -->
        <div class="sidebar-overlay"></div>

        <!-- Content -->
        <div class="sidebar-content">
           <!-- TOP FIXED AREA -->
           <div class="top-section">
                <h2 class="animated-text" style="animation: fadeIn 2.5s ease-in-out; text-align: center;">Explore Nearby Places</h2>

                <!-- 🔍 Search -->
                <div class="search-box">
                    <input type="text" id="addressInput" placeholder="Search location..." oninput="searchAddress()" />
                    <h3 id="searchStatus" class="search-status">Searching places near you</h3>
                    <div id="suggestions"></div>
                </div>

                <!-- 🎯 Filters -->
                <div class="filters">

                    <div class="filter-group">
                        <div class="filter-header">
                            <label>Distance</label>
                            <span id="distanceValue">10 km</span>
                        </div>
                        <input type="range" id="distanceRange" min="5" max="100" value="10" oninput="updateDistance()" />
                    </div>

                <div class="filter-group">
                    <label class="filter-label">Country</label>
                    <select id="countryFilter">
                        <option value="">All</option>
                        <option>India</option>
                        <option>USA</option>
                        <option>France</option>
                        <option>Australia</option>
                    </select>
                </div>

                    <button onclick="useSelectedAddress()">Search Places</button>
                </div>
            </div>
            <!-- 📦 Results -->
            <!-- SCROLL AREA -->
            <div id="places"></div>

        </div>
    </div>

    <!-- 🗺️ Map -->
    <div id="map">
    </div>
    

</div>

<script>
let map;
let selectedLat = null;
let selectedLng = null;
let typingTimer;
let markersLayer = L.layerGroup();

// 📍 Show Map
function showPosition(position) {
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    if (map) map.remove();

    map = L.map('map').setView([lat, lng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    markersLayer.addTo(map);

    L.marker([lat, lng]).addTo(markersLayer)
        .bindPopup("📍 Selected Location")
        .openPopup();

    const distance = document.getElementById("distanceRange").value;

    L.circle([lat, lng], {
        color: 'blue',
        fillColor: '#3b82f6',
        fillOpacity: 0.2,
        radius: distance * 1000
    }).addTo(map);

    fetchPlaces(lat, lng);
}

function updateDistance() {
    const value = document.getElementById("distanceRange").value;
    document.getElementById("distanceValue").innerText = value + " km";
}
setTimeout(() => {
    map.invalidateSize();
}, 500);


// 🌐 Fetch Places
function fetchPlaces(lat, lng) {
    const distance = document.getElementById("distanceRange").value;
    const country = document.getElementById("countryFilter").value;

    fetch('/get_places', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ lat, lng, distance, country })
    })
    .then(res => res.json())
    .then(data => renderPlaces(data));
}

// 🧊 Render Places
function renderPlaces(data) {
    let output = "";

    markersLayer.clearLayers();

    let nearest = data.length > 0
        ? data.reduce((a, b) => a.distance < b.distance ? a : b)
        : null;

    data.forEach(place => {
        let isNearest = nearest && place.name === nearest.name;

        output += `
    <div class="card ${isNearest ? 'nearest' : ''}" 
         onclick="focusPlace(${place.lat}, ${place.lng})">

        <div class="card-header">
            <h3>${place.name}</h3>
            ${isNearest ? '<span class="badge">Nearest</span>' : ''}
        </div>

        <div class="card-body">
            <span class="distance">📍 ${place.distance} km</span>
        </div>

    </div>
`;
        L.marker([place.lat, place.lng])
            .addTo(markersLayer)
            .bindPopup(place.name);
    });

    document.getElementById("places").innerHTML = output;
}

// 🔍 Search Address (Debounced)
function searchAddress() {
    const input = document.getElementById("addressInput").value;
    const status = document.getElementById("searchStatus");
    const suggestionsBox = document.getElementById("suggestions");

    if (input.trim() === "") {
        status.classList.remove("active");
        suggestionsBox.classList.remove("show");
        suggestionsBox.innerHTML = "";
        return;
    }

    status.classList.add("active");

    clearTimeout(typingTimer);

    typingTimer = setTimeout(() => {
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input}`)
        .then(res => res.json())
        .then(data => {

            let suggestions = "";

            data.forEach(place => {
                suggestions += `
                    <div onclick="selectAddress(${place.lat}, ${place.lon}, \`${place.display_name}\`)">
                        ${place.display_name}
                    </div>
                `;
            });

            suggestionsBox.innerHTML = suggestions;
            suggestionsBox.classList.add("show");
            status.classList.remove("active");
        });
    }, 500);
}

// 📌 Select Address
function selectAddress(lat, lng, name) {
    selectedLat = lat;
    selectedLng = lng;

    document.getElementById("addressInput").value = name;

    const suggestions = document.getElementById("suggestions");
    suggestions.innerHTML = "";
    suggestions.classList.remove("show");
}

// 🚀 Search Button
function useSelectedAddress() {

    const sidebar = document.querySelector(".sidebar");
    const mapDiv = document.getElementById("map");

    // shrink sidebar
    sidebar.classList.add("shrink");

    // expand map
    mapDiv.classList.add("expand");

    // delay for smooth Leaflet render
    setTimeout(() => {
        if (map) map.invalidateSize();
    }, 500);

    // run search
    if (selectedLat && selectedLng) {
        showPosition({
            coords: { latitude: selectedLat, longitude: selectedLng }
        });
    } else if (userLat && userLng) {
        showPosition({
            coords: { latitude: userLat, longitude: userLng }
        });
    } else {
        alert("Please select or allow location!");
    }
}
// 🎯 Smooth Map Zoom
function focusPlace(lat, lng) {
    map.flyTo([lat, lng], 15, { duration: 1.5 });
}


</script>

</body>
</html>
